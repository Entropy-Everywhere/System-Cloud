<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a new account on System Cloud.">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="System Cloud">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="../icons/icon-512.png">
    <title>System Cloud - Sign Up</title>
    <link rel="stylesheet" href="../style.css">
    <script src="firebase-config.js"></script>
    <script src="database.js"></script>
    <script>
        // Redirect to homepage if already logged in
        DB.checkAuth(true);

        async function handleSignup(event) {
            event.preventDefault();
            const user = document.getElementById("userinput").value.trim();
            const email = document.getElementById("emailinput").value.trim();
            const pass = document.getElementById("passwordinput").value;
            const repass = document.getElementById("repasswordinput").value;

            if (!user) {
                DB.showToast("Username cannot be empty.", "error");
                return;
            }
            if (!email) {
                DB.showToast("Email cannot be empty.", "error");
                return;
            }
            if (!pass) {
                DB.showToast("Password cannot be empty.", "error");
                return;
            }
            if (pass !== repass) {
                DB.showToast("Passwords do not match.", "error");
                return;
            }

            // Sync Firestore data first so we don't accidentally overwrite existing users
            if (window.FIRESTORE_ENABLED) {
                await DB.initFirestore();
            }

            const result = DB.signup(user, email, pass);
            if (result.success) {
                DB.showToast("Account created successfully! Logging you in...", "success");
                setTimeout(() => {
                    window.location.href = "homepage.html";
                }, 1000);
            } else {
                DB.showToast(result.message, "error");
            }
        }
    </script>
</head>

<body>
    <div class="container animate-fade-in">
        <div class="back-bar">
            <a href="../index.html" class="btn-back" id="btn-back-landing">
                &larr; Back to welcome
            </a>
            <a href="settings.html" class="btn btn-secondary" style="margin-left:auto;">Settings</a>
        </div>

        <main class="glass-card">
            <h1>Create Account</h1>
            <p class="subtitle">Join and start managing your system details today</p>

            <form onsubmit="handleSignup(event)" id="signup-form">
                <div class="form-group">
                    <label for="userinput">Username</label>
                    <input type="text" id="userinput" class="input-field" placeholder="Username" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="emailinput">Email Address</label>
                    <input type="email" id="emailinput" class="input-field" placeholder="you@example.com" required
                        autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="passwordinput">Password</label>
                    <input type="password" id="passwordinput" class="input-field" placeholder="••••••••" required
                        autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label for="repasswordinput">Confirm Password</label>
                    <input type="password" id="repasswordinput" class="input-field" placeholder="••••••••" required
                        autocomplete="new-password">
                </div>

                <button type="submit" class="btn btn-primary" id="btn-submit-signup">Register Now</button>
            </form>

            <a href="login.html" class="link-muted" id="link-to-login">Already have an account? Sign in here</a>
        </main>
    </div>
</body>

</html>
