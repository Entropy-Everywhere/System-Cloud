<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Log in to your System Cloud account.">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="System Cloud">
    <link rel="manifest" href="../manifest.json">
    <link rel="apple-touch-icon" href="../icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="../icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="../icons/icon-512.png">
    <title>System Cloud - Login</title>
    <link rel="stylesheet" href="../style.css">
    <script src="firebase-config.js"></script>
    <script src="database.js"></script>
    <script>
        // Redirect to homepage if already logged in
        DB.checkAuth(true);

        // Pre-fill remembered username
        window.addEventListener('DOMContentLoaded', () => {
            const lastUser = localStorage.getItem('plural_last_username');
            if (lastUser) {
                document.getElementById('userinput').value = lastUser;
                document.getElementById('passwordinput').focus();
            }
        });

        async function handleLogin(event) {
            event.preventDefault();
            const user = document.getElementById("userinput").value.trim();
            const pass = document.getElementById("passwordinput").value;

            if (!user || !pass) {
                DB.showToast("Please enter both username and password.", "error");
                return;
            }

            // Sync Firestore data before checking credentials (critical for cross-device login)
            if (window.FIRESTORE_ENABLED) {
                await DB.initFirestore();
            }

            const result = DB.login(user, pass);
            if (result.success) {
                DB.showToast("Login successful! Redirecting...", "success");
                setTimeout(() => {
                    window.location.href = "homepage.html";
                }, 1000);
            } else {
                DB.showToast(result.message, "error");
            }
        }
    </script>
</head>

<body>
    <div class="container animate-fade-in">
        <div class="back-bar">
            <a href="../index.html" class="btn-back" id="btn-back-landing">
                &larr; Back to welcome
            </a>
            <a href="settings.html" class="btn btn-secondary" style="margin-left:auto;">Settings</a>
        </div>

        <main class="glass-card">
            <h1>Welcome Back</h1>
            <p class="subtitle">Enter your credentials to access your system dashboard</p>

            <form onsubmit="handleLogin(event)" id="login-form">
                <div class="form-group">
                    <label for="userinput">Username</label>
                    <input type="text" id="userinput" class="input-field" placeholder="Username" required
                        autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="passwordinput">Password</label>
                    <input type="password" id="passwordinput" class="input-field" placeholder="••••••••" required
                        autocomplete="current-password">
                </div>

                <button type="submit" class="btn btn-primary" id="btn-submit-login">Sign In</button>
            </form>

            <a href="signup.html" class="link-muted" id="link-to-signup">Don't have an account? Sign up here</a>
        </main>
    </div>
</body>

</html>
