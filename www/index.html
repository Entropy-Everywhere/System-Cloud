<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A premium, secure personal dashboard to manage your system's alters and track active fronters.">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="System Cloud">
    <title>System Cloud</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png">
</head>

<body>
    <div class="container animate-fade-in">
        <main class="glass-card" id="welcome-card">
            <h1>System Cloud</h1>
            <p class="subtitle">A secure, personal dashboard to manage your system's alters and track active fronters.
            </p>

            <div class="button-container">
                <a class="btn btn-primary" href="pages/login.html" id="btn-login-redirect">Login</a>
                <a class="btn btn-secondary" href="pages/signup.html" id="btn-signup-redirect">Create Account</a>
                <button class="btn btn-primary" id="btn-install-pwa" style="display:none; margin-top: 16px;">Install App</button>
            </div>
        </main>
    </div>
    <script>
        // ── Service Worker Registration ──
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(() => {});
            });
        }

        // ── PWA Install Prompt ──
        let deferredPrompt = null;
        const installBtn = document.getElementById('btn-install-pwa');

        window.addEventListener('beforeinstallprompt', (event) => {
            // Prevent Chrome 67+ from auto-showing the prompt
            event.preventDefault();
            // Stash the event so it can be triggered later
            deferredPrompt = event;
            // Show the install button
            if (installBtn) installBtn.style.display = '';
        });

        if (installBtn) {
            installBtn.addEventListener('click', async () => {
                if (!deferredPrompt) return;
                // Show the install prompt
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                if (result.outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                } else {
                    console.log('User dismissed the install prompt');
                }
                // Reset – prompt can only be used once
                deferredPrompt = null;
                installBtn.style.display = 'none';
            });
        }

        window.addEventListener('appinstalled', () => {
            // App was installed – hide the button
            deferredPrompt = null;
            if (installBtn) installBtn.style.display = 'none';
            console.log('System Cloud was installed!');
        });
    </script>
</body>

</html>
