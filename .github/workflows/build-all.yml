# System Cloud — Build ALL distributables automatically
# When you push a tag like v1.0.0, this builds:
#   - 📱 Android APK (sideloadable, no Play Store needed)
#   - 🪟 Windows Setup.exe installer
#   - 📦 Itch.io zip
#
# The built files are uploaded as "artifacts" — download them from the
# GitHub Actions page and upload to Itch.io.

name: Build All Platforms

on:
  push:
    tags:
      - 'v*'           # Trigger on tags: v1.0.0, v2.1.3, etc.
  workflow_dispatch:    # Also allows manual trigger from GitHub UI

jobs:
  # ── Android APK ──
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Install Pillow (for icon generation)
        run: pip install Pillow

      - name: Build Android APK
        run: node scripts/build-android.js

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: System-Cloud-Android
          path: android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

  # ── Windows Installer ──
  windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build Electron app
        run: npx electron-packager . System-Cloud --platform=win32 --arch=x64 --out=dist --icon=icons/icon-512.ico --overwrite --prune=true --ignore=node_modules/electron --ignore=build.config.json --ignore=dist --ignore=android --ignore=www --ignore=.github

      - name: Build Setup.exe installer
        run: node build-installer.js

      - name: Create Itch.io zip
        run: Compress-Archive -Path dist\System-Cloud-win32-x64\* -DestinationPath dist\System-Cloud-Windows.zip -Force

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: System-Cloud-Windows-Installer
          path: dist/installer/
          if-no-files-found: error

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: System-Cloud-Windows-Portable
          path: dist/System-Cloud-Windows.zip
          if-no-files-found: error
